# Nombre de la aplicación
spring.application.name=bodega-digital-inventario

# Puerto del servidor
server.port=8888

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Base de datos H2 (archivo local) - Configuración estable y sin bloqueos
spring.datasource.url=jdbc:h2:file:./data/bodega_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Consola H2 (útil para ver tablas y datos)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Ejecuta data.sql después de crear tablas (si tienes data.sql)
spring.jpa.defer-datasource-initialization=true
# spring.sql.init.mode=always          # Descomenta si quieres datos iniciales cada vez
# spring.sql.init.data-locations=classpath:data.sql

# Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Thymeleaf (desactiva cache en desarrollo)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Subida de archivos (fotos de productos)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.enabled=true

# Recursos estáticos + carpeta uploads
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Desactiva Spring Security (ya que quitaste login)
spring.security.enabled=false

# Logging (menos ruido)
logging.level.org.springframework.web.servlet.resource=ERROR

# Opcional: ver consultas SQL (descomenta cuando necesites debuggear)
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE